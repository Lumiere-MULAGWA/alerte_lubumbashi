version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: alert_postgres
    environment:
      POSTGRES_USER: alert_user
      POSTGRES_PASSWORD: strong_password
      POSTGRES_DB: alert_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alert_network

  redis:
    image: redis:7-alpine
    container_name: alert_redis
    ports:
      - "6379:6379"
    networks:
      - alert_network

volumes:
  postgres_data:

networks:
  alert_network:
    driver: bridge